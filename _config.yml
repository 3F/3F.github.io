# Site settings
title: ^_^
subtitle: ...
email: entry.reg@gmail.com
baseurl: ""
url: "https://r-eg.net" # base hostname
domain: "r-eg.net"

# root path to doc structure
docp: "/doc"
#permalink: pretty

collections:
    doc: # main documentation
        output: true


# Build settings
markdown: kramdown

redcarpet:
  extensions: ["tables", "no_intra_emphasis", "fenced_code_blocks", "strikethrough", "superscript", "with_toc_data", "space_after_headers", "footnotes", "prettify"]
  # "autolink",

kramdown:
    smart_quotes: ["apos", "apos", "quot", "quot"]
    auto_ids: true # generate ID for headings
    input: GFM # +GitHub Flavored Markdown
  
#highlighter: pygments
highlighter: rouge
